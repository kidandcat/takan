{{define "content"}}
<div class="card auth-card">
  <div class="card-head">
    <div>
      <h1>Invitation only</h1>
      <p class="muted" style="margin-top:.35rem">Public registration is closed for now.</p>
    </div>
  </div>
  {{if .Error}}<p class="err">{{.Error}}</p>{{end}}
  <p class="muted" style="margin-top:1.1rem;text-align:center">Already invited? <a href="/login">Log in</a></p>
</div>
{{end}}
